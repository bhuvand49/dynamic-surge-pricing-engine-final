<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dynamic Surge Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #020617;
}
#map {
  width: 100%;
  height: 100%;
}
.leaflet-control-attribution {
  background: rgba(15,23,42,.7);
  color: white;
}
</style>
</head>

<body>
<div id="map"></div>

<script>
const API = "https://dynamic-surge-pricing-engine-backend.onrender.com";

const map = L.map("map", { zoomControl: true })
  .setView([12.9716, 77.5946], 11);

L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { maxZoom: 18 }
).addTo(map);

let surgeLayers = [];
let driverMarkers = [];
let riderMarkers = [];

function color(v){
  if(v >= 3) return "#ef4444";
  if(v >= 2) return "#f97316";
  if(v >= 1.4) return "#facc15";
  return "#22c55e";
}

function clear(arr){
  arr.forEach(layer => map.removeLayer(layer));
  arr.length = 0;
}

async function loadSurge(){
  try{
    const res = await fetch(`${API}/surge/all`);
    const data = await res.json();

    clear(surgeLayers);

    data.forEach(item=>{
      item.polygons.forEach(poly=>{
        const layer = L.polygon(poly,{
          color: color(item.surge_multiplier),
          fillColor: color(item.surge_multiplier),
          fillOpacity: 0.28,
          weight: 1
        }).addTo(map);

        surgeLayers.push(layer);
      });
    });
  }catch(e){}
}

async function loadDrivers(){
  try{
    const res = await fetch(`${API}/drivers`);
    const data = await res.json();

    clear(driverMarkers);

    data.forEach(d=>{
      const m = L.circleMarker([d.lat,d.lon],{
        radius: 2.5,
        color:"#3b82f6",
        fillColor:"#3b82f6",
        fillOpacity:0.8
      }).addTo(map);

      driverMarkers.push(m);
    });
  }catch(e){}
}

async function loadRiders(){
  try{
    const res = await fetch(`${API}/riders`);
    const data = await res.json();

    clear(riderMarkers);

    data.forEach(r=>{
      const m = L.circleMarker([r.lat,r.lon],{
        radius: 2.5,
        color:"#a855f7",
        fillColor:"#a855f7",
        fillOpacity:0.8
      }).addTo(map);

      riderMarkers.push(m);
    });
  }catch(e){}
}

loadSurge();
loadDrivers();
loadRiders();

setInterval(loadSurge, 2500);
setInterval(loadDrivers, 1800);
setInterval(loadRiders, 1800);
</script>
</body>
</html>
