<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dynamic Surge Pricing Engine</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;background:#020617;color:#fff;font-family:Arial}
#map{height:100vh;width:100%}
.panel{
position:absolute;z-index:1000;
background:rgba(15,23,42,.85);
padding:15px;border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,.35)
}
#title{top:12px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:800}
#info{top:92px;left:15px;width:260px}
#controls{top:92px;right:15px;width:240px}
.legend{bottom:15px;left:15px}
button{
width:100%;padding:10px;margin-top:8px;
border:none;border-radius:10px;
font-weight:bold;color:#fff;cursor:pointer
}
.blue{background:#3b82f6}
.green{background:#22c55e}
.orange{background:#f97316}
.red{background:#ef4444}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel" id="title">🚀 Dynamic Surge Pricing Engine</div>

<div class="panel" id="info">
<h3>📍 Region Info</h3>
<div>Area: <span id="area">-</span></div>
<div>Drivers: <span id="drivers">-</span></div>
<div>Riders: <span id="riders">-</span></div>
<div>Final Surge: <span id="final">-</span></div>
</div>

<div class="panel" id="controls">
<h3>⚙ Controls</h3>
<button class="blue" onclick="setScenario(1,null)">🌧 Rain ON</button>
<button class="green" onclick="setScenario(0,null)">☀ Rain OFF</button>
<button class="orange" onclick="setScenario(null,1)">🎉 Event ON</button>
<button class="red" onclick="setScenario(null,0)">😴 Event OFF</button>
<div id="status" style="margin-top:10px">Loading...</div>
</div>

<div class="panel legend">
<div>🟢 Normal</div>
<div>🟡 Busy</div>
<div>🟠 High</div>
<div>🔴 Extreme</div>
<div>🔵 Drivers</div>
<div>🟣 Riders</div>
</div>

<script>
const API="https://dynamic-surge-api.onrender.com";
const map=L.map("map").setView([12.9716,77.5946],11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let baseGrid=[],surgeGrid=[],driverMarkers=[],riderMarkers=[];

function color(s){
if(s>=3)return"#ff0000";
if(s>=2)return"#ff7a00";
if(s>=1.4)return"#ffd000";
return"#00ff9c";
}

function clear(arr){
arr.forEach(x=>map.removeLayer(x));
arr.length=0;
}

async function loadGrid(){
const res=await fetch(API+"/grid");
const data=await res.json();

clear(baseGrid);

data.forEach(z=>{
z.polygons.forEach(poly=>{
baseGrid.push(
L.polygon(poly,{
color:"#334155",
weight:1,
fillOpacity:0
}).addTo(map)
);
});
});
}

async function loadSurge(){
const res=await fetch(API+"/surge/all");
const data=await res.json();

clear(surgeGrid);

data.forEach(z=>{
z.polygons.forEach(poly=>{
const layer=L.polygon(poly,{
color:color(z.surge_multiplier),
fillColor:color(z.surge_multiplier),
fillOpacity:.55,
weight:2
}).addTo(map);

layer.on("click",()=>{
area.innerText=z.area;
drivers.innerText=z.drivers;
riders.innerText=z.riders;
final.innerText=z.surge_multiplier+"x";
});

surgeGrid.push(layer);
});
});
}

async function loadDrivers(){
const res=await fetch(API+"/drivers");
const data=await res.json();

clear(driverMarkers);

data.forEach(d=>{
driverMarkers.push(
L.circleMarker([d.lat,d.lon],{
radius:4,
color:"#3b82f6",
fillOpacity:1
}).addTo(map)
);
});
}

async function loadRiders(){
const res=await fetch(API+"/riders");
const data=await res.json();

clear(riderMarkers);

data.forEach(r=>{
riderMarkers.push(
L.circleMarker([r.lat,r.lon],{
radius:4,
color:"#d946ef",
fillOpacity:1
}).addTo(map)
);
});
}

async function sync(){
const res=await fetch(API+"/scenario");
const s=await res.json();
status.innerText=`Rain:${s.rain} | Event:${s.event}`;
}

async function setScenario(rain,event){
const cur=await fetch(API+"/scenario");
const old=await cur.json();

await fetch(API+"/scenario",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
rain:rain===null?old.rain:rain,
event:event===null?old.event:event
})
});

sync();
}

loadGrid();
loadSurge();
loadDrivers();
loadRiders();
sync();

setInterval(loadSurge,4000);
setInterval(loadDrivers,2000);
setInterval(loadRiders,2000);
setInterval(sync,4000);
</script>

</body>
</html>
