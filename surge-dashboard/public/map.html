<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dynamic Surge Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #020617;
}
#map {
  width: 100%;
  height: 100%;
}
.leaflet-control-attribution {
  background: rgba(15,23,42,.7);
  color: white;
}
</style>
</head>

<body>
<div id="map"></div>

<script>
const API = "https://dynamic-surge-pricing-engine-backend.onrender.com";

const map = L.map("map", { zoomControl: true })
  .setView([12.9716, 77.5946], 11);

L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { maxZoom: 18 }
).addTo(map);

let surgeLayers = [];
let driverMarkers = [];
let riderMarkers = [];

function zoneColor(v){
  if(v >= 3) return "#ef4444";
  if(v >= 2) return "#f97316";
  if(v >= 1.4) return "#facc15";
  return "#22c55e";
}

function clearLayers(arr){
  arr.forEach(layer => map.removeLayer(layer));
  arr.length = 0;
}

async function refreshMap(){
  try{
    const [surgeRes, driverRes, riderRes] = await Promise.all([
      fetch(`${API}/surge/all`),
      fetch(`${API}/drivers`),
      fetch(`${API}/riders`)
    ]);

    const surge = await surgeRes.json();
    const drivers = await driverRes.json();
    const riders = await riderRes.json();

    clearLayers(surgeLayers);
    clearLayers(driverMarkers);
    clearLayers(riderMarkers);

    surge.forEach(item => {
      item.polygons.forEach(poly => {
        const layer = L.polygon(poly, {
          color: zoneColor(item.surge_multiplier),
          fillColor: zoneColor(item.surge_multiplier),
          fillOpacity: 0.30,
          weight: 1
        }).addTo(map);

        surgeLayers.push(layer);
      });
    });

    drivers.forEach(d => {
      const marker = L.circleMarker([d.lat, d.lon], {
        radius: 3,
        color: "#3b82f6",
        fillColor: "#3b82f6",
        fillOpacity: 0.85
      }).addTo(map);

      driverMarkers.push(marker);
    });

    riders.forEach(r => {
      const marker = L.circleMarker([r.lat, r.lon], {
        radius: 3,
        color: "#a855f7",
        fillColor: "#a855f7",
        fillOpacity: 0.85
      }).addTo(map);

      riderMarkers.push(marker);
    });

  } catch(err){
    console.log("Map load error", err);
  }
}

refreshMap();
setInterval(refreshMap, 4000);
</script>
</body>
</html>
